name: Sync PS Plus catalog

on:
  schedule:
    # GitHub cron uses UTC. 15:00 UTC is 23:00 in Asia/Shanghai.
    - cron: "0 15 11-25 * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ps-plus-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Sync catalog to Notion
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Validate repository secrets
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATA_SOURCE_ID: ${{ secrets.NOTION_DATA_SOURCE_ID }}
        run: |
          if [[ -z "$NOTION_API_KEY" || -z "$NOTION_DATA_SOURCE_ID" ]]; then
            echo "Missing NOTION_API_KEY or NOTION_DATA_SOURCE_ID repository secret." >&2
            exit 1
          fi

      - name: Sync PlayStation catalog to Notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATA_SOURCE_ID: ${{ secrets.NOTION_DATA_SOURCE_ID }}
        run: python sync.py
